name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      # Re-runs can leave a stale artifact on this workflow run.
      - name: Delete stale Pages artifact (if any)
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages
          failOnError: false

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # upload-pages-artifact can occasionally produce duplicates on retry.
      - name: Prune duplicate Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifacts=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '[.artifacts[] | select(.name == "github-pages")] | sort_by(.created_at) | reverse')
          count=$(echo "$artifacts" | jq 'length')
          echo "Found $count github-pages artifact(s)."
          if [ "$count" -le 1 ]; then
            exit 0
          fi
          echo "$artifacts" | jq -r '.[1:] | .[].id' | while read -r id; do
            echo "Deleting duplicate artifact $id"
            gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/$id"
          done

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
