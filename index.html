<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <script>
      (function () {
        var key = 'smart-hoop.theme';
        var pref = 'dark';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark' || stored === 'system') pref = stored;
        } catch (e) {}
        var resolved = pref === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : pref;
        document.documentElement.setAttribute('data-theme', resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = resolved === 'light' ? '#f4f4f8' : '#1a1a2e';
      })();
    </script>
    <meta name="description" content="Smart Hoop — тренировки баскетбольных бросков" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Smart Hoop</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
